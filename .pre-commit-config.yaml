# https://pre-commit.com/
repos:
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-no-eval
        entry: "nocheckin"
        language: pygrep
        files: ^(?!.pre-commit-config).*.(h|c|hpp|cpp|json|jsonc|yaml|yml|txt|py|md|toml|cfg|gd)$
        exclude: ^addons/.*$
        types: []
  # - repo: https://github.com/Scony/godot-gdscript-toolkit
  #   rev: 4.5.0
  #   hooks:
  #     - id: gdlint
  #       # name: gdlint
  #       # description: "gdlint - linter for GDScript"
  #       # entry: gdlint
  #       # language: python
  #       # language_version: python3
  #       # require_serial: true
  #       # types: [gdscript]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v4.0.0-alpha.8"
    hooks:
      - id: prettier
        # name: prettier
        files: \.(json|ldtk)$
        stages: [pre-commit]
        args: ["--tab-width", "2"]
  - repo: local
    hooks:
      - id: gdscript-formatter
        name: gdscript-formatter
        entry: gdscript-formatter
        stages: [pre-commit, pre-merge-commit, pre-push, manual]
        require_serial: true
        always_run: true
        language: system
        types: [gdscript]
