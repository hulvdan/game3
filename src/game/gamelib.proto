syntax = "proto3"

enum TestEnum {
  TEST_ENUM_UNSPECIFIED = 0;
  TEST_ENUM_UNIVERSAL = 1;
  TEST_ENUM_WEB = 2;
  TEST_ENUM_IMAGES = 3;
  TEST_ENUM_LOCAL = 4;
  TEST_ENUM_NEWS = 5;
  TEST_ENUM_PRODUCTS = 6;
  TEST_ENUM_VIDEO = 7;
};

message Gamelib {
  string string_field = 1;
  int32 int32_field = 2;
  repeated int32 int32_array_field = 3;
  TestEnum enum_field = 4;
}
