syntax = "proto3";

message GV2i {
  int32 x = 1;
  int32 y = 2;
}

message GV2 {
  float x = 1;
  float y = 2;
}

message GV3i {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
}

message GV3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message GCreatureToSpawn {
  int32 creature_type = 1;
  GV2 pos = 2;
}

message GDoor {
  GV2 center_pos = 1;
  GV2 size = 2;
  int32 direction = 3;
}

message GSpike {
  GV2 pos = 1;
}

message GRoom {
  // repeated GV2 tiles = 1;
  repeated GDoor doors = 2;
  GV2i size = 3;
  repeated int32 tiles = 4;
  repeated GSpike spikes = 5;
  repeated GCreatureToSpawn creatures = 6;
}

message GProgression {
  int32 type = 1;
  string debug_name = 2;
  GV2i pos = 3;
}

message GAttackPolygon {
  float distance = 1;
  float angle = 2;
}

message GCreatureDrop {
  int32 item_type = 1;
  int32 min = 2;
  int32 max = 3;
}

message GCreature {
  int32 type = 1;
  string debug_name = 2;
  string res = 3;
  int32 creature_type = 4;
  int32 hp = 5;
  float speed = 6;
  int32 attack_projectile_type = 7;
  repeated float attack_projectiles_spawn_at = 8;
  float attack_duration = 9;
  float melee__attack_polygon_start_at = 10;
  float melee__attack_polygon_end_at = 11;
  float melee__attack_stops_tracking_at = 12;
  int32 melee__damage = 13;
  int32 collision_type = 14;
  float attack_cooldown_min = 15;
  float attack_cooldown_max = 16;
  GAttackPolygon melee__attack_polygon = 17;
  repeated GCreatureDrop drops = 18;
}

message GDamage {
  int32 type = 1;
  string debug_name = 2;
}

message GItem {
  int32 type = 1;
  string debug_name = 2;
}

message GCollectible {
  int32 type = 1;
  string debug_name = 2;
  int32 item_type = 3;
}

message GProjectileFly {
  int32 type = 1;
  string debug_name = 2;
}

message GProjectile {
  int32 type = 1;
  string debug_name = 2;
  string res = 3;
  int32 projectilefly_type = 4;
  float arc__height = 5;
  float arc__duration = 6;
  float arc__aoe_radius = 7;
  float straight__speed = 8;
  int32 damage = 9;
  int32 pierce = 10;
  float collider_radius = 11;
}

message GCollision {
  int32 type = 1;
  string debug_name = 2;
}

message Lib {
  int32 debug_collisions = 1;
  repeated GRoom rooms = 2;
  float player_speed_shooting_scale = 3;
  float player_speed_blocking_scale = 4;
  float player_speed_inside_enemies_scale = 5;
  float player_roll_duration_seconds = 6;
  float player_roll_can_shoot_after = 7;
  float player_roll_distance = 8;
  float player_roll_pow = 9;
  float player_roll_invincibility_start = 10;
  float player_roll_invincibility_end = 11;
  float player_stamina = 12;
  float player_stamina_regen_per_second = 13;
  float player_stamina_roll_cost = 14;
  float player_dodge_stamina_retrieve_percent = 15;
  float player_stamina_rally_decay_after = 16;
  float player_stamina_rally_decay_per_second = 17;
  float player_stamina_attack_cost = 18;
  float player_stamina_attack_rally_scale = 19;
  float player_stamina_roll_rally_scale = 20;
  float player_stamina_blocking_scale = 21;
  float stamina_regen_on_kill = 22;
  float player_block_min_delay = 23;
  float player_block_increase_per_second = 24;
  float player_block_state_min_duration = 25;
  float player_block_cooldown = 26;
  float player_roll_cooldown = 27;
  float player_perfect_block_window = 28;
  float player_stamina_depletion_regen_delay = 29;
  float action_consumption_duration = 30;
  float player_shooting_stamina_regen_scale = 31;
  float player_invincibility_after_hit_seconds = 32;
  float mob_invincibility_spikes_seconds = 33;
  float spikes_duration_seconds = 34;
  float spikes_damage_starts_at = 35;
  int32 spikes_damage = 36;
  float creatures_push_radius = 37;
  float creatures_push_force = 38;
  float arrow_speed = 39;
  int32 arrow_damage = 40;
  float shooting_seconds = 41;
  float shooting_after_roll_seconds = 42;
  GV2i world_size = 43;
  GV2i progression_size = 44;
  // TABLE_GEN_START
  repeated GDamage damages = 45;
  repeated GProgression progression = 46;
  repeated GCreature creatures = 47;
  repeated GItem items = 48;
  repeated GCollectible collectibles = 49;
  repeated GProjectileFly projectile_fly_types = 50;
  repeated GProjectile projectiles = 51;
  repeated GCollision collision_flags = 52;
  // TABLE_GEN_END
}
