syntax = "proto3";

message GV2i {
  int32 x = 1;
  int32 y = 2;
}

message GV2 {
  float x = 1;
  float y = 2;
}

message GV3i {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
}

message GV3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message GCreatureToSpawn {
  int32 creature_type = 1;
  GV2 pos = 2;
}

message GDoor {
  GV2 center_pos = 1;
  GV2 size = 2;
  int32 direction = 3;
}

message GSpike {
  GV2 pos = 1;
}

message GRoom {
  // repeated GV2 tiles = 1;
  repeated GDoor doors = 2;
  GV2i size = 3;
  repeated int32 tiles = 4;
  repeated GSpike spikes = 5;
  repeated GCreatureToSpawn creatures = 6;
}

message GProgression {
  int32 type = 1;
  string debug_name = 2;
  GV2i pos = 3;
}

message GAttackPolygon {
  float distance_min = 1;
  float distance_max = 2;
  float angle = 3;
  float anchor_x = 4;
}

message GAttackCircle {
  float radius = 1;
  float anchor_x = 2;
}

message GCreatureDrop {
  int32 item_type = 1;
  int32 min = 2;
  int32 max = 3;
}

message GMeleeTag {
  int32 type = 1;
  string debug_name = 2;
}

message GMeleeTagValue {
  int32 meleetag_type = 1;
  int32 i1 = 2;
  int32 i2 = 3;
  int32 i3 = 4;
  int32 i4 = 5;
  float f1 = 6;
  float f2 = 7;
  float f3 = 8;
  float f4 = 9;
}

message GAttack {
  float duration = 1;
  float cooldown_min = 2;
  float cooldown_max = 3;
  float distance = 4;

  int32 projectile_type = 5;
  repeated float projectiles_spawn_at = 6;

  int32 melee__damage = 7;
  float melee__attack_collision_starts_at = 8;
  float melee__attack_collision_ends_at = 9;
  float melee__attack_stops_tracking_at = 10;
  int32 melee__attack_collider_type = 11;
  repeated GMeleeTagValue melee__tags = 12;

  GAttackPolygon melee__attack_polygon = 13;
  GAttackCircle melee__attack_circle = 14;
}

message GCreature {
  int32 type = 1;
  string debug_name = 2;
  string res = 3;
  int32 creature_type = 4;
  int32 hp = 5;
  float speed = 6;

  int32 mask_type = 7;
  repeated GCreatureDrop drops = 8;

  repeated GAttack attacks = 9;
}

message GDamage {
  int32 type = 1;
  string debug_name = 2;
}

message GItem {
  int32 type = 1;
  string debug_name = 2;
}

message GCollectible {
  int32 type = 1;
  string debug_name = 2;
  int32 item_type = 3;
}

message GProjectileFly {
  int32 type = 1;
  string debug_name = 2;
}

message GProjectileTag {
  int32 type = 1;
  string debug_name = 2;
}

message GProjectileTagValue {
  int32 projectiletag_type = 1;
  int32 i1 = 2;
  float f1 = 3;
  int32 projectile_type = 4;
}

message GProjectile {
  int32 type = 1;
  string debug_name = 2;

  string res = 3;

  int32 damage = 4;
  int32 pierce = 5;
  float collider_radius = 6;
  float distance = 7;

  int32 projectilefly_type = 8;

  float arc__height = 9;
  float arc__duration = 10;

  float default__speed = 11;

  repeated GProjectileTagValue tags = 12;
}

message GMask {
  int32 type = 1;
  string debug_name = 2;
}

message GConfigControls {
  float action_consumption_duration = 1;
}

message GConfigSpikes {
  float duration_seconds = 1;
  float damage_starts_at = 2;
  int32 damage = 3;
}

message GConfigPlayer {
  float speed_scale__shooting = 1;
  float speed_scale__blocking = 2;
  float speed_scale__inside_enemies = 3;

  float roll_distance = 4;
  float roll_pow = 5;
  float roll_invincibility_start = 6;
  float roll_invincibility_end = 7;
  float roll_duration_seconds = 8;

  float stamina = 9;
  float stamina_regen_per_second = 10;
  float stamina_roll_cost = 11;
  float dodge_stamina_retrieve_percent = 12;
  float stamina_rally_decay_after = 13;
  float stamina_rally_decay_per_second = 14;
  float stamina_attack_cost = 15;
  float stamina_attack_rally_scale = 16;
  float stamina_roll_rally_scale = 17;
  float stamina_regen_on_kill = 18;

  float stamina_regen_scale__blocking = 19;
  float stamina_regen_scale__shooting = 20;

  float block__activation_start = 21;
  float ki__rally_increase_per_second = 22;
  float block__min_duration = 23;
  float block__idle_after_block = 24;
  float cooldown__block = 25;
  float cooldown__roll = 26;
  float block__perfect_end = 27;

  float stamina_depletion_regen_delay = 28;
  float invincibility_after_hit_seconds = 29;
  float shooting_seconds = 30;
  float shooting_after_roll_seconds = 31;
}

message Lib {
  GConfigControls controls = 1;
  GConfigPlayer player = 2;
  GConfigSpikes spikes = 3;

  int32 debug_collisions = 4;
  int32 debug_collisions__chase = 5;

  repeated GRoom rooms = 6;
  float mob_invincibility_spikes_seconds = 7;
  float blocked_attack_damages_again_after = 8;
  float creatures_push_radius = 9;
  float creatures_push_force = 10;

  float impulse_duration_seconds = 11;
  float impulse_pow = 12;
  float impulse_block_scale = 13;

  GV2i world_size = 14;
  GV2i progression_size = 15;
  // TABLE_GEN_START
  repeated GDamage damages = 16;
  repeated GProgression progression = 17;
  repeated GCreature creatures = 18;
  repeated GItem items = 19;
  repeated GCollectible collectibles = 20;
  repeated GProjectileFly projectile_fly_types = 21;
  repeated GProjectileTag projectile_tags = 22;
  repeated GProjectile projectiles = 23;
  repeated GMask masks = 24;
  repeated GMeleeTag melee_tags = 25;
  // TABLE_GEN_END
}
