syntax = "proto3";

message G_Creature {
  string name = 1;
  int32 id = 2;
  string email = 3;

  enum G_PhoneType {
    MOBILE = 0;
    HOME = 1;
    WORK = 2;
  }

  message G_PhoneNumber {
    string number = 1;
    G_PhoneType type = 2;
  }

  repeated G_PhoneNumber phones = 4;
}

message Glib {
  repeated G_Creature creatures = 1;
}
