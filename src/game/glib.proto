syntax = "proto3";

message GV2i {
  int32 x = 1;
  int32 y = 2;
}

message GV2 {
  float x = 1;
  float y = 2;
}

message GV3i {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
}

message GV3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message GMobToSpawn {
  int32 creature_type = 1;
  GV2 pos = 2;
}

message GDoor {
  GV2 center_pos = 1;
  GV2 size = 3;
  int32 direction = 2;
}

message GSpike {
  GV2 pos = 1;
}

message GRoom {
  // repeated GV2 tiles = 1;
  repeated GDoor doors = 2;
  GV2i size = 3;
  repeated int32 tiles = 4;
  repeated GSpike spikes = 5;
}

message GProgression {
  int32 type = 1;
  string debug_name = 2;
  GV2i pos = 3;
}

message GAttackPolygon {
  float distance = 1;
  float angle = 2;
}

message GCreature {
  int32 type = 1;
  string debug_name = 2;
  string res = 3;
  int32 creature_type = 4;
  int32 hp = 5;
  float speed = 6;
  int32 attack_projectile_type = 7;
  repeated float attack_projectiles_spawn_at = 8;
  float attack_duration = 9;
  float melee__attack_polygon_start_at = 14;
  float melee__attack_polygon_end_at = 15;
  float melee__attack_stops_tracking_at = 17;
  int32 melee__damage = 16;
  int32 collision_type = 10;
  float attack_cooldown_min = 11;
  float attack_cooldown_max = 12;
  GAttackPolygon melee__attack_polygon = 13;
}

message GDamage {
  int32 type = 1;
  string debug_name = 2;
}

message GItem {
  int32 type = 1;
  string debug_name = 2;
}

message GCollectible {
  int32 type = 1;
  string debug_name = 2;
  int32 item_type = 3;
}

message GProjectileFly {
  int32 type = 1;
  string debug_name = 2;
}

message GProjectile {
  int32 type = 1;
  string debug_name = 2;
  string res = 3;
  int32 projectilefly_type = 4;
  float arc__height = 5;
  float arc__duration = 6;
  float arc__aoe_radius = 9;
  float straight__speed = 7;
  int32 damage = 8;
  int32 pierce = 10;
  float collider_radius = 11;
}

message GCollision {
  int32 type = 1;
  string debug_name = 2;
}

message Lib {
  int32 debug_collisions = 5;
  repeated GMobToSpawn mobs_to_spawn = 1;
  repeated GRoom rooms = 2;
  float player_speed_holding_scale = 3;
  float player_speed_inside_enemies_scale = 17;
  float player_roll_duration_seconds = 18;
  float player_roll_can_shoot_after = 19;
  float player_roll_distance = 22;
  float player_roll_pow = 23;
  float player_roll_invincibility_start = 33;
  float player_roll_invincibility_end = 34;
  int32 player_stamina_charges = 24;
  float player_stamina_regen_seconds = 20;
  float player_holding_stamina_regen_scale = 21;
  float player_invincibility_after_hit_seconds = 28;
  float mob_invincibility_spikes_seconds = 29;
  float spikes_duration_seconds = 25;
  float spikes_damage_starts_at = 26;
  int32 spikes_damage = 30;
  float creatures_push_radius = 15;
  float creatures_push_force = 16;
  float arrow_speed = 9;
  int32 arrow_damage = 11;
  float shooting_seconds = 13;
  float shooting_after_roll_seconds = 14;
  GV2i world_size = 4;
  GV2i progression_size = 6;
  // TABLE_GEN_START
  repeated GDamage damages = 27;
  repeated GProgression progression = 7;
  repeated GCreature creatures = 8;
  repeated GItem items = 32;
  repeated GCollectible collectibles = 31;
  repeated GProjectileFly projectile_fly_types = 36;
  repeated GProjectile projectiles = 35;
  repeated GCollision collision_flags = 37;
  // TABLE_GEN_END
}
