syntax = "proto3";

message GV2i {
  int32 x = 1;
  int32 y = 2;
}

message GV2 {
  float x = 1;
  float y = 2;
}

message GV3i {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
}

message GV3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message GMobToSpawn {
  string res = 1;
  GV2 pos = 2;
}

message GDoor {
  GV2 pos = 1;
  int32 direction = 2;
}

message GRoom {
  repeated GV2 tiles = 1;
  repeated GDoor doors = 2;
  GV2 size = 3;
}

message Lib {
  repeated GMobToSpawn mobs_to_spawn = 1;
  repeated GRoom rooms = 2;
}
