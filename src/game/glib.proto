syntax = "proto3";

message GCreature {
  string name = 1;
  int32 id = 2;
  string email = 3;

  enum GPhoneType {
    MOBILE = 0;
    HOME = 1;
    WORK = 2;
  }

  message GPhoneNumber {
    string number = 1;
    GPhoneType type = 2;
  }

  repeated GPhoneNumber phones = 4;
}

message Lib {
  repeated GCreature creatures = 1;
}
