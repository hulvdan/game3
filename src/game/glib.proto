syntax = "proto3";

message GV2i {
  int32 x = 1;
  int32 y = 2;
}

message GV2 {
  float x = 1;
  float y = 2;
}

message GV3i {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
}

message GV3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message GCreatureToSpawn {
  int32 creature_type = 1;
  GV2 pos = 2;
}

message GDoor {
  GV2 center_pos = 1;
  GV2 size = 2;
  int32 direction = 3;
}

message GSpike {
  GV2 pos = 1;
}

message GRoom {
  // repeated GV2 tiles = 1;
  repeated GDoor doors = 2;
  GV2i size = 3;
  repeated int32 tiles = 4;
  repeated GSpike spikes = 5;
  repeated GCreatureToSpawn creatures = 6;
}

message GProgression {
  int32 type = 1;
  string debug_name = 2;
  GV2i pos = 3;
}

message GAttackPolygon {
  float distance = 1;
  float angle = 2;
}

message GCreatureDrop {
  int32 item_type = 1;
  int32 min = 2;
  int32 max = 3;
}

message GCreature {
  int32 type = 1;
  string debug_name = 2;
  string res = 3;
  int32 creature_type = 4;
  int32 hp = 5;
  float speed = 6;
  int32 attack_projectile_type = 7;
  repeated float attack_projectiles_spawn_at = 8;
  float attack_duration = 9;
  float melee__attack_polygon_start_at = 10;
  float melee__attack_polygon_end_at = 11;
  float melee__attack_stops_tracking_at = 12;
  int32 melee__damage = 13;
  int32 collision_type = 14;
  float attack_cooldown_min = 15;
  float attack_cooldown_max = 16;
  GAttackPolygon melee__attack_polygon = 17;
  repeated GCreatureDrop drops = 18;
}

message GDamage {
  int32 type = 1;
  string debug_name = 2;
}

message GItem {
  int32 type = 1;
  string debug_name = 2;
}

message GCollectible {
  int32 type = 1;
  string debug_name = 2;
  int32 item_type = 3;
}

message GProjectileFly {
  int32 type = 1;
  string debug_name = 2;
}

message GProjectile {
  int32 type = 1;
  string debug_name = 2;
  string res = 3;
  int32 projectilefly_type = 4;
  float arc__height = 5;
  float arc__duration = 6;
  float arc__aoe_radius = 7;
  float straight__speed = 8;
  int32 damage = 9;
  int32 pierce = 10;
  float collider_radius = 11;
}

message GCollision {
  int32 type = 1;
  string debug_name = 2;
}

message GConfigControls {
  float action_consumption_duration = 1;
}

message GConfigSpikes {
  float duration_seconds = 1;
  float damage_starts_at = 2;
  int32 damage = 3;
}

message GConfigPlayer {
  float speed_shooting_scale = 1;
  float speed_blocking_scale = 2;
  float speed_inside_enemies_scale = 3;
  float roll_duration_seconds = 4;
  float roll_can_shoot_after = 5;
  float roll_distance = 6;
  float roll_pow = 7;
  float roll_invincibility_start = 8;
  float roll_invincibility_end = 9;
  float stamina = 10;
  float stamina_regen_per_second = 11;
  float stamina_roll_cost = 12;
  float dodge_stamina_retrieve_percent = 13;
  float stamina_rally_decay_after = 14;
  float stamina_rally_decay_per_second = 15;
  float stamina_attack_cost = 16;
  float stamina_attack_rally_scale = 17;
  float stamina_roll_rally_scale = 18;
  float stamina_blocking_scale = 19;
  float stamina_regen_on_kill = 20;
  float block_min_delay = 21;
  float block_increase_per_second = 22;
  float block_state_min_duration = 23;
  float block_cooldown = 24;
  float roll_cooldown = 25;
  float perfect_block_window = 26;
  float stamina_depletion_regen_delay = 27;
  float shooting_stamina_regen_scale = 28;
  float invincibility_after_hit_seconds = 29;
  float shooting_seconds = 30;
  float shooting_after_roll_seconds = 31;
}

message Lib {
  GConfigControls controls = 1;
  GConfigPlayer player = 2;
  GConfigSpikes spikes = 3;
  int32 debug_collisions = 4;
  repeated GRoom rooms = 5;
  float mob_invincibility_spikes_seconds = 6;
  float creatures_push_radius = 7;
  float creatures_push_force = 8;
  GV2i world_size = 9;
  GV2i progression_size = 10;
  // TABLE_GEN_START
  repeated GDamage damages = 11;
  repeated GProgression progression = 12;
  repeated GCreature creatures = 13;
  repeated GItem items = 14;
  repeated GCollectible collectibles = 15;
  repeated GProjectileFly projectile_fly_types = 16;
  repeated GProjectile projectiles = 17;
  repeated GCollision collision_flags = 18;
  // TABLE_GEN_END
}
