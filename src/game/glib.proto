message GCreatureToSpawn {
  int32 creature_type = 1;
  GV2 pos = 2;
}

message GDoor {
  GV2 center_pos = 1;
  GV2 size = 2;
  int32 direction = 3;
}

message GSpike {
  GV2 pos = 1;
}

message GRoomInteractable {
  int32 interactable_type = 1;
  GV2 pos = 2;
}

message GRoom {
  // repeated GV2 tiles = 1;
  repeated GDoor doors = 2;
  GV2i size = 3;
  repeated int32 tiles = 4;
  repeated GSpike spikes = 5;
  repeated GRoomInteractable interactables = 6;
  repeated GCreatureToSpawn creatures = 7;
}

message GProgression {
  int32 type = 1;
  string debug_name = 2;
  GV2i pos = 3;
}

message GCreatureDrop {
  int32 item_type = 1;
  int32 min = 2;
  int32 max = 3;
}

message GTag {
  int32 type = 1;
  string debug_name = 2;
}

message GTagValue {
  int32 tag_type = 1;

  int32 i1 = 2;
  int32 i2 = 3;
  int32 i3 = 4;
  int32 i4 = 5;
  int32 i5 = 6;
  int32 i6 = 7;
  float f1 = 8;
  float f2 = 9;
  float f3 = 10;
  float f4 = 11;
  float f5 = 12;
  float f6 = 13;

  int32 projectile_type = 14;
  int32 creature_type = 15;
  int32 team_flags = 16;
}

/* [[[cog
   for type, suffix in (
     ('bool', 'Bool'),
     ('int32', 'Int32'),
     ('float', 'Float'),
     ('string', 'String'),
     ('GV2', 'V2'),
     ('GV3', 'V3'),
     ('GV4', 'V4'),
   ):
     print(rf"""message GKeyframe{suffix} {{
       int32 id = 1;
       int32 index_timeline = 2;
       {type} value = 3;
     }}""")
   cog]]] */
message GKeyframeBool {
  int32 id = 1;
  int32 index_timeline = 2;
  bool value = 3;
}
message GKeyframeInt32 {
  int32 id = 1;
  int32 index_timeline = 2;
  int32 value = 3;
}
message GKeyframeFloat {
  int32 id = 1;
  int32 index_timeline = 2;
  float value = 3;
}
message GKeyframeString {
  int32 id = 1;
  int32 index_timeline = 2;
  string value = 3;
}
message GKeyframeV2 {
  int32 id = 1;
  int32 index_timeline = 2;
  GV2 value = 3;
}
message GKeyframeV3 {
  int32 id = 1;
  int32 index_timeline = 2;
  GV3 value = 3;
}
message GKeyframeV4 {
  int32 id = 1;
  int32 index_timeline = 2;
  GV4 value = 3;
}
// [[[end]]]

message GCol {
  int32 type = 1;
  string debug_name = 2;
}

message GCollider {
  int32 id = 1;
  int32 type = 2;
  string debug_name = 3;

  GV2 tr = 4;
  bool is_active = 5;

  float circle__radius = 6;

  float capsule__radius = 7;
  float capsule__spread = 8;
  float capsule__rotation = 9;

  float polygon__dist_min = 10;
  float polygon__dist_max = 11;
  float polygon__rotation = 12;
  float polygon__spread_angle = 13;
}

message GColliderAnimated {
  int32 id = 1;
  int32 type = 2;
  string debug_name = 3;

  repeated GKeyframeV2 tr = 4;
  repeated GKeyframeBool is_active = 5;

  repeated GKeyframeFloat circle__radius = 6;

  repeated GKeyframeFloat capsule__radius = 7;
  repeated GKeyframeFloat capsule__spread = 8;
  repeated GKeyframeFloat capsule__rotation = 9;

  repeated GKeyframeFloat polygon__dist_min = 10;
  repeated GKeyframeFloat polygon__dist_max = 11;
  repeated GKeyframeFloat polygon__rotation = 12;
  repeated GKeyframeFloat polygon__spread_angle = 13;
}

message GAttackMelee {
  int32 damage = 1;
  GStaminaCost damage_stamina = 2;
  int32 evade_flags = 3;
  repeated GColliderAnimated colliders = 4;
  int32 hp_rally_recover = 5;
}

message GStaminaCost {
  float flat = 1;
  float rally_discard_mult_pre = 2;
  float rally = 3;
  float rally_discard_mult_post = 4;
}

message GProjectileSpawn {
  int32 at = 1;
  float angle = 2;
}

message GImpulseData {
  int32 id = 1;
  int32 at = 2;
  float distance = 3;
  int32 dur = 4;
  float pow = 5;
  float rotation = 6;
}

message GAttack {
  string debug_name = 1;
  bool debug_mirrored = 2;

  int32 duration_frames = 3;
  int32 stamina_consumption_frame = 4;

  float cooldown_min = 5;
  float cooldown_max = 6;

  float movement_scale = 7;
  GStaminaCost stamina_cost = 8;

  repeated GKeyframeBool tracking_enabled = 9;

  int32 projectile_type = 10;
  repeated GProjectileSpawn projectile_spawns = 11;

  GAttackMelee melee = 12;
  repeated GTagValue tags = 13;
  repeated GImpulseData impulses = 14;

  repeated GCollider conditions = 15;
}

message GAbility {
  int32 type = 1;
  string debug_name = 2;
  repeated GAttack attacks = 3;
  int32 recovering_attacks = 4;
}

message GCreature {
  int32 type = 1;
  string debug_name = 2;
  string res = 3;
  int32 creature_type = 4;
  int32 hp = 5;
  float speed = 6;
  float rotation_speed = 7;
  float mass = 8;

  float collider_size = 9;

  repeated GCreatureDrop drops = 10;

  repeated GAttack attacks = 11;
  repeated int32 ability_types = 12;
}

message GDamage {
  int32 type = 1;
  string debug_name = 2;
}

message GEvade {
  int32 type = 1;
  string debug_name = 2;
}

message GTeam {
  int32 type = 1;
  string debug_name = 2;
}

message GItem {
  int32 type = 1;
  string debug_name = 2;
}

message GCollectible {
  int32 type = 1;
  string debug_name = 2;
  int32 item_type = 3;
}

message GProjectileFly {
  int32 type = 1;
  string debug_name = 2;
}

message GImpulse {
  int32 type = 1;
  string debug_name = 2;
}

message GProjectile {
  int32 type = 1;
  string debug_name = 2;

  string res = 3;

  int32 damage = 4;
  GStaminaCost damage_stamina = 5;
  int32 hp_rally_recover = 6;
  float impulse = 7;
  int32 impulse_type = 8;
  int32 evade_flags = 9;

  int32 pierce = 10;
  float collider_radius = 11;
  float distance = 12;

  int32 projectilefly_type = 13;

  float arc__height = 14;
  float arc_or_area__duration = 15;

  float default__speed = 16;

  int32 touch_team_flags = 17;

  repeated GTagValue tags = 18;
}

message GInteractable {
  int32 type = 1;
  string debug_name = 2;
  string res = 3;

  int32 hp = 4;
  int32 projectile_type = 5;
  float mass = 6;
}

message GMask {
  int32 type = 1;
  string debug_name = 2;
}

message GConfigControls {
  float action_consumption_duration = 1;
}

message GConfigSpikes {
  float duration_seconds = 1;
  float damage_starts_at = 2;
  int32 damage = 3;
  int32 initial_evade_flags = 4;
  int32 continuous_evade_flags = 5;
}

message GConfigPlayer {
  float speed_scale__shooting = 1;
  float speed_scale__blocking = 2;
  float speed_scale__inside_enemies = 3;

  float roll_distance = 4;
  float roll_pow = 5;
  float roll_invincibility_start = 6;
  float roll_invincibility_end = 7;
  float roll_duration_seconds = 8;
  float roll_control_return_starts_at = 9;

  float stamina = 10;
  float stamina_regen_per_second = 11;
  GStaminaCost roll_stamina_cost = 12;
  float dodge_stamina_retrieve_percent = 13;
  float stamina_rally_decay_after = 14;
  float stamina_rally_decay_per_second = 15;
  float stamina_attack_cost = 16;
  float stamina_attack_rally_scale = 17;
  float stamina_roll_rally_scale = 18;
  float stamina_regen_on_kill = 19;
  float stamina_ki_decay_after = 20;
  float stamina_ki_decay_speed = 21;

  float stamina_regen_scale__blocking = 22;
  float stamina_regen_scale__shooting = 23;

  float block__activation_start = 24;
  float ki__rally_increase_per_second = 25;
  float block__min_duration = 26;
  float block__idle_after_block = 27;
  float cooldown__block = 28;
  float cooldown__roll = 29;
  float block__perfect_end = 30;

  float stamina_depletion_regen_delay = 31;
  float invincibility_after_hit_seconds = 32;
}

message Lib {
  // Engine

  // Game
  GConfigControls controls = 1;
  GConfigPlayer player = 2;
  GConfigSpikes spikes = 3;

  int32 debug_collisions = 4;
  int32 debug_collisions__chase = 5;

  float hp_damage_rally_percent = 6;
  float hp_rally_decays_after = 7;
  float hp_rally_decay_speed = 8;

  repeated GRoom rooms = 9;
  float mob_invincibility_spikes_seconds = 10;
  float blocked_attack_damages_again_after = 11;
  float creatures_push_radius = 12;
  float creatures_push_force = 13;
  float mob_arc_throw_distance_delta = 14;

  float default_impulse_duration_seconds = 15;
  float default_impulse_pow = 16;
  float impulse_block_scale = 17;

  GV2i world_size = 18;
  GV2i progression_size = 19;

  // TABLE_GEN_START
  repeated GCol colliders = 20;
  repeated GDamage damages = 21;
  repeated GEvade evades = 22;
  repeated GTeam teams = 23;
  repeated GProgression progression = 24;
  repeated GAbility abilities = 25;
  repeated GCreature creatures = 26;
  repeated GItem items = 27;
  repeated GCollectible collectibles = 28;
  repeated GProjectileFly projectile_fly_types = 29;
  repeated GProjectile projectiles = 30;
  repeated GInteractable interactables = 31;
  repeated GMask masks = 32;
  repeated GTag tags = 33;
  repeated GImpulse impulses = 34;
  // TABLE_GEN_END
}
