syntax = "proto3";

message GLCreature {
  string name = 1;
  int32 id = 2;
  string email = 3;

  enum GLPhoneType {
    MOBILE = 0;
    HOME = 1;
    WORK = 2;
  }

  message GLPhoneNumber {
    string number = 1;
    GLPhoneType type = 2;
  }

  repeated GLPhoneNumber phones = 4;
}

message Glib {
  repeated GLCreature creatures = 1;
}
